<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Electrical Summit 2026 | Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles"></div>
    <canvas id="spark-canvas"></canvas>

    <div class="slider-container">
        <div class="slider" id="main-slider">
            <!-- Slide 1: Cover Card -->
            <section class="slide cover-slide">
                <div class="card-envelope">
                    <div class="logos-header">
                        <div class="logo-box">
                             <img src="assets/kpil_logo_new.png" alt="KPIL" class="logo-img">
                        </div>
                        <div class="logo-box">
                             <svg viewBox="0 0 100 100" class="logo-svg">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="#00E5FF" stroke-width="2"/>
                                <path d="M50 20 L40 50 L50 50 L45 80 L65 45 L55 45 Z" fill="#F4FF81" />
                            </svg>
                        </div>
                    </div>
                    <p class="welcome">WELCOME TO THE FUTURE</p>
                    <h1 class="hero-title">BHARAT ELECTRICAL<br>SUMMIT 2026</h1>
                    <button class="open-btn" onclick="nextSlide()">
                        OPEN INVITATION
                        <span class="btn-glow"></span>
                    </button>
                    <p class="swipe-hint">or swipe left to explore</p>
                </div>
            </section>

            <!-- Slide 2: Invitation Details -->
            <section class="slide details-slide">
                <div class="details-card">
                    <button class="back-btn" onclick="prevSlide()">← Back</button>
                    <h2 class="section-title">You are Cordially Invited</h2>
                    
                    <div class="main-info">
                        <div class="date-highlight">
                            <span class="month">MARCH 2026</span>
                            <span class="days">19 — 22</span>
                        </div>
                        
                        <div class="location-box">
                            <span class="location-top">VENUE</span>
                            <span class="location-main">BHARAT MANDAPAM</span>
                            <span class="location-sub">NEW DELHI</span>
                        </div>
                    </div>

                    <div class="stall-info">
                        <div class="stall-item">
                            <span class="s-label">HALL NO</span>
                            <span class="s-value">___</span>
                        </div>
                        <div class="stall-item">
                            <span class="s-label">STALL NO</span>
                            <span class="s-value">___</span>
                        </div>
                    </div>

                    <p class="footer-branding">KPIL | BHARAT ELECTRICAL SUMMIT TEAM</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="floating-icons">
        <div class="icon-wrap helmet"><svg viewBox="0 0 100 100" class="icon"><path fill="#00E5FF" d="M10,60 Q10,10 50,10 Q90,10 90,60 L95,65 L10,65 Z" /></svg></div>
        <div class="icon-wrap tower"><svg viewBox="0 0 100 100" class="icon"><path fill="none" stroke="#00E5FF" stroke-width="2" d="M20,100 L50,10 L80,100 M20,80 L80,80 M35,50 L65,50" /></svg></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
