<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Electrical Summit 2026 | Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles"></div>
    <canvas id="spark-canvas"></canvas>

    <div class="invite-container">
        <div class="invite-poster">
            <!-- Top Logos -->
            <div class="logos-header">
                <div class="logo-box" id="kpil-container">
                    <img src="assets/kpil_logo_new.png" alt="KPIL Logo" class="logo-img">
                </div>
                <div class="logo-box" id="summit-container">
                    <div class="summit-svg-container">
                        <svg viewBox="0 0 100 100" class="logo-svg">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="url(#summit-grad)" stroke-width="2"/>
                            <path d="M50 20 L40 50 L50 50 L45 80 L65 45 L55 45 Z" fill="#F4FF81" />
                            <defs>
                                <linearGradient id="summit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#F4FF81;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
                <div class="energy-line"></div>
            </div>

            <!-- Title -->
            <h1 class="main-title">BHARAT ELECTRICAL<br>SUMMIT 2026</h1>

            <!-- Invitation Text -->
            <p class="subtitle">YOU ARE CORDIALLY INVITED</p>

            <!-- Date Highlight -->
            <div class="date-box">
                19 March – 22 March 2026
            </div>

            <!-- Hall + Stall Layout -->
            <div class="event-details">
                <div class="detail-item">
                    <span class="label">Hall No</span>
                    <span class="value">___</span>
                </div>
                <div class="detail-item">
                    <span class="label">Stall No</span>
                    <span class="value">___</span>
                </div>
            </div>

            <!-- Floating Illustration Elements (Small icons) -->
            <div class="floating-icons">
                <div class="icon-wrap helmet" style="top: 15%; left: 8%;">
                    <svg viewBox="0 0 100 100" class="icon"><path fill="#00E5FF" d="M10,60 Q10,10 50,10 Q90,10 90,60 L95,65 L10,65 Z" /></svg>
                </div>
                <div class="icon-wrap tower" style="bottom: 12%; right: 10%;">
                    <svg viewBox="0 0 100 100" class="icon"><path fill="none" stroke="#00E5FF" stroke-width="3" d="M20,100 L50,10 L80,100 M20,80 L80,80 M35,50 L65,50" /></svg>
                </div>
                <div class="icon-wrap bolt" style="top: 35%; right: 5%;">
                    <svg viewBox="0 0 100 100" class="icon"><path fill="#F4FF81" d="M60,10 L30,50 L50,50 L40,90 L70,40 L50,40 Z" /></svg>
                </div>
            </div>

            <footer class="poster-footer">
                @BHARAT ELECTRICAL SUMMIT 2026
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
