<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Electrical Summit 2026 | Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <!-- Background Layers -->
    <div class="bg-pulse-layer"></div>
    <div class="particles"></div>
    <canvas id="spark-canvas"></canvas>

    <!-- Floating Industry Icons -->
    <div class="atmospheric-layer">
        <div class="float-icon icon-tower-1"><svg viewBox="0 0 100 100"><path fill="none" stroke="#00E5FF" stroke-width="2" d="M20,100 L50,10 L80,100 M20,80 L80,80 M35,50 L65,50" /></svg></div>
        <div class="float-icon icon-bolt-1"><svg viewBox="0 0 100 100"><path fill="#F4FF81" d="M60,10 L30,50 L50,50 L40,90 L70,40 L50,40 Z" /></svg></div>
        <div class="float-icon icon-resistor-1"><svg viewBox="0 0 100 100"><path fill="none" stroke="#00E5FF" stroke-width="3" d="M10,50 L30,50 L35,30 L45,70 L55,30 L65,70 L70,50 L90,50" /></svg></div>
        <div class="float-icon icon-helmet-1"><svg viewBox="0 0 100 100"><path fill="#00E5FF" d="M10,60 Q10,10 50,10 Q90,10 90,60 L95,65 L10,65 Z" /></svg></div>
        <div class="float-icon icon-cable-1"><svg viewBox="0 0 100 100"><path fill="none" stroke="#F4FF81" stroke-width="2" stroke-dasharray="4,4" d="M10,80 Q50,20 90,80" /></svg></div>
    </div>

    <div class="wrapper">
        <!-- COVER PAGE -->
        <section class="cover" id="cover">
            <div class="card">
                <div class="logos-header">
                    <div class="logo-box" id="logo-kpil">
                        <img src="assets/kpil_logo_new.png" alt="KPIL" class="logo-img">
                    </div>
                    <div class="logo-box" id="logo-summit">
                        <svg viewBox="0 0 100 100" class="logo-svg">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#00E5FF" stroke-width="2"/>
                            <path d="M50 20 L40 50 L50 50 L45 80 L65 45 L55 45 Z" fill="#F4FF81" />
                        </svg>
                    </div>
                </div>
                
                <p class="eyebrow">A SYNERGY OF POWER</p>
                
                <div class="title-container">
                    <div class="title-lightning"></div>
                    <h1 class="hero-title">BHARAT ELECTRICAL<br>SUMMIT 2026</h1>
                </div>

                <button class="reveal-btn" onclick="openInvite()">
                    OPEN INVITATION
                    <span class="btn-glow"></span>
                </button>
            </div>
        </section>

        <!-- INVITATION DETAILS PAGE -->
        <section class="invite" id="invite">
            <div class="energy-revealer-lines"></div>
            <div class="invite-content">
                <h2 class="reveal-heading">You Are Cordially Invited</h2>
                
                <div class="date-container">
                    <div class="date-badge">
                        <span class="date-label">SAVE THE DATE</span>
                        <span class="date-text">19 MARCH — 22 MARCH 2026</span>
                    </div>
                </div>

                <div class="venue-info">
                    <span class="venue-label">VENUE</span>
                    <h3 class="venue-name">BHARAT MANDAPAM</h3>
                    <p class="venue-location">Pragati Maidan, New Delhi</p>
                </div>

                <div class="stall-details">
                    <div class="stall-badge">
                        <span class="s-label">HALL NO</span>
                        <span class="s-value">___</span>
                    </div>
                    <div class="stall-badge">
                        <span class="s-label">STALL NO</span>
                        <span class="s-value">___</span>
                    </div>
                </div>

                <footer class="invite-footer">
                    <p>BHARAT ELECTRICAL SUMMIT 2026 | HOSTED BY KPIL</p>
                </footer>
            </div>
        </section>
    </div>

    <script src="script.js?v=1.1"></script>
</body>
</html>
